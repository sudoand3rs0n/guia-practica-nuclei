id: bwapp-default-credentials

info:
  name: bWAPP - Default Credentials (bee/bug)
  author: anderson-steven
  severity: high
  description: |
    Confirms that bWAPP's documented default credentials (bee/bug) remain active by attempting
    a login and checking for the successful-login redirect to portal.php.
  reference:
    - https://github.com/raesene/bWAPP/blob/master/app/login.php
  tags: default-login,bwapp,custom

http:
  - method: POST
    path:
      - "{{BaseURL}}/login.php"
    headers:
      Content-Type: application/x-www-form-urlencoded
    body: "login=bee&password=bug&security_level=0&form=submit"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        part: header
        words:
          - "portal.php"
